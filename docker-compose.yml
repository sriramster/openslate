services:
  openslate:
    build: .
    ports:
      - "8080:8080"                        # local dev / IP-only
      # - "80:80"                           # uncomment for custom domain + HTTPS
      # - "443:443"                         # uncomment for custom domain + HTTPS
    volumes:
      - data:/data
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - DOMAIN=${DOMAIN}
      - R2_BUCKET=${R2_BUCKET}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY=${R2_ACCESS_KEY}
      - R2_SECRET_KEY=${R2_SECRET_KEY}
    restart: unless-stopped

volumes:
  data:
